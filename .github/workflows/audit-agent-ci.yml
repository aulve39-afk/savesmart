name: Audit-Agent AI — CI/CD

on:
  push:
    branches: ["main", "claude/**"]
    paths: ["audit-agent/**", "app/audit/**", "app/components/audit/**", "app/hooks/useContractAnalysis.ts"]
  pull_request:
    branches: ["main"]
    paths: ["audit-agent/**"]

# Un seul workflow en cours par branche (annule les runs précédents)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/audit-agent

jobs:

  # ── 1. Lint & Type Check ──────────────────────────────────────────────────
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: audit-agent/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: audit-agent/backend/requirements.txt

      - name: Install linting tools only
        run: pip install ruff==0.9.7 mypy==1.14.1 pydantic==2.10.6 pydantic-settings==2.7.1

      - name: Ruff lint
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        run: ruff format app/ --check

      - name: Mypy type check
        run: mypy app/ --strict --ignore-missing-imports


  # ── 2. Tests unitaires ────────────────────────────────────────────────────
  test:
    name: "Tests (Python 3.12)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    defaults:
      run:
        working-directory: audit-agent/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: audit-agent/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download fr_core_news_sm  # Modèle léger pour les tests

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --timeout=60
        env:
          ENVIRONMENT: development
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
          # En CI: utiliser des mocks pour éviter les appels API réels
          USE_AI_MOCKS: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: audit-agent/backend/coverage.xml
          flags: backend


  # ── 3. Security Scan ──────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bandit (Python security linter)
        run: |
          pip install bandit[toml]==1.8.3
          bandit -r audit-agent/backend/app/ \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r audit-agent/backend/app/ --severity-level high

      - name: Trivy (container vulnerability scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "audit-agent/backend"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"


  # ── 4. Build Docker ───────────────────────────────────────────────────────
  build:
    name: "Build Docker (multi-arch)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: audit-agent/backend
          file: audit-agent/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers entre les builds (réduit le temps de 20min → 5min)
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── 5. Deploy Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: "Deploy → Staging"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://audit-staging.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        # En production: utiliser un outil de déploiement (Kamal, Helm, etc.)
        run: |
          echo "Deploying ${{ github.sha }} to staging..."
          # Exemple avec Kamal:
          # gem install kamal
          # kamal deploy --destination staging


  # ── 6. Smoke Tests Staging ────────────────────────────────────────────────
  smoke-tests:
    name: "Smoke Tests (Staging)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-staging
    environment:
      name: staging

    steps:
      - name: Health check
        run: |
          curl -f https://audit-staging.example.com/health || exit 1

      - name: API smoke test
        run: |
          # Test upload endpoint avec un PDF minimal
          curl -f -X POST https://audit-staging.example.com/api/v1/contracts/upload \
            -H "Authorization: Bearer ${{ secrets.STAGING_API_KEY }}" \
            -F "file=@tests/fixtures/sample_contract.pdf" \
            | jq '.job_id' || exit 1


  # ── 7. Deploy Production (approbation manuelle) ───────────────────────────
  deploy-prod:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke-tests
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://audit.example.com
      # Requiert une approbation manuelle dans GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying ${{ github.ref_name }} to production..."
