<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable icon: full bleed background, content in inner 80% safe zone -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="256" fill="url(#shine)"/>

  <!-- K — vertical bar (centered in safe zone) -->
  <rect x="148" y="144" width="62" height="224" rx="18" fill="white"/>

  <!-- K — top arm -->
  <path d="M204 256 L348 144 L386 144 L244 256 Z" fill="white"/>
  <!-- K — bottom arm -->
  <path d="M204 256 L348 368 L386 368 L244 256 Z" fill="white"/>

  <!-- Subscription dots -->
  <circle cx="392" cy="182" r="20" fill="rgba(255,255,255,0.35)"/>
  <circle cx="392" cy="182" r="12" fill="white"/>
  <rect x="387" y="202" width="10" height="108" rx="5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="392" cy="330" r="20" fill="rgba(255,255,255,0.35)"/>
  <circle cx="392" cy="330" r="12" fill="white"/>
</svg>
