    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Euro sign centered within safe zone -->
  <path d="M296 150 C253 150 218 176 205 214 L180 214 L180 232 L204 232 C203.5 238 203.5 244 204 250 L180 250 L180 268 L205 268 C218 306 253 332 296 332 C320 332 342 323 358 308 L340 290 C328 302 313 310 296 310 C271 310 250 295 240 274 L314 274 L314 256 L233 256 C232 250 232 238 233 232 L314 232 L314 214 L240 214 C250 193 271 178 296 178 C313 178 328 186 340 198 L358 180 C342 165 320 150 296 150 Z" fill="white"/>

  <!-- Trend dots -->
