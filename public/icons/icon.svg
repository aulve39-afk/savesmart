<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shine top overlay -->
  <rect width="512" height="260" rx="0" fill="url(#shine)"/>
  <rect width="512" height="112" rx="112" ry="112" fill="url(#shine)"/>

  <!-- Decorative circle behind K -->
  <circle cx="256" cy="256" r="168" fill="rgba(255,255,255,0.08)"/>

  <!-- K — vertical bar -->
  <rect x="138" y="134" width="66" height="244" rx="20" fill="white"/>

  <!-- K — top arm (diagonal going top-right) -->
  <path d="M198 256 L358 134 L398 134 L238 256 Z" fill="white"/>
  <!-- K — bottom arm (diagonal going bottom-right) -->
  <path d="M198 256 L358 378 L398 378 L238 256 Z" fill="white"/>

  <!-- Subscription indicator dots (right side, linked) -->
  <circle cx="400" cy="172" r="22" fill="rgba(255,255,255,0.35)"/>
  <circle cx="400" cy="172" r="13" fill="white"/>

  <rect x="394" y="194" width="12" height="124" rx="6" fill="rgba(255,255,255,0.35)"/>

  <circle cx="400" cy="340" r="22" fill="rgba(255,255,255,0.35)"/>
  <circle cx="400" cy="340" r="13" fill="white"/>
</svg>
