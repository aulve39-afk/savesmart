version: "3.9"

# ── Stack complète Audit Agent + SaveSmart Frontend ───────────────────────────
# Usage dev:  docker compose up
# Usage prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

networks:
  app_net:
    driver: bridge

volumes:
  redis_data:

services:

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUDIT_API_URL: /api/v1
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: audit-frontend:latest
    container_name: audit-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - AUDIT_API_BACKEND_URL=http://api:8000
      - NODE_ENV=production
    networks:
      - app_net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Backend FastAPI ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./audit-agent/backend
      dockerfile: Dockerfile
      target: runtime
    image: audit-agent-api:latest
    container_name: audit-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./audit-agent/backend/.env
    environment:
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    networks:
      - app_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Worker Celery ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./audit-agent/backend
      dockerfile: Dockerfile.worker
    image: audit-agent-worker:latest
    container_name: audit-worker
    restart: unless-stopped
    env_file: ./audit-agent/backend/.env
    environment:
      - ENVIRONMENT=production
    networks:
      - app_net
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 1G

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: audit-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ── Flower (monitoring Celery) — démarrer avec --profile monitoring ──────────
  flower:
    image: mher/flower:2.0
    container_name: audit-flower
    restart: unless-stopped
    command: ["celery", "--broker=${REDIS_URL}", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    networks:
      - app_net
    depends_on:
      - redis
    profiles:
      - monitoring
